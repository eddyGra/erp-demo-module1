<!DOCTYPE html>

<html>
    <head>
        <title>ERP Demo</title>
        <link rel="stylesheet" href="index.css">
    </head> 
    <body>
        <header>
            <h1>ERP Demo</h1>
        </header>

        <main>
            <section id="operacion">
                <h2 id="title">Nombre de la operación</h2>
                <div id="operador">
                <table>
                    <tr><th>Nombre del operador: </th>
                    <td id="nombre-operador">Esteban Quito</td></tr>
                    <tr><th>Numero de nómina: </th>
                    <td id="nomina-operador">50530</td></tr>
                </table>
                </div>
                </section>

                <aside class="sidebar">
                    <h2>Menú de navegación</h2>
                    <nav>
                        <ul>
                            <li><a>Crear una WO</a></li>
                            <li><a>Avance de WO</a></li>
                            <li><a>Inventario</a></li>
                        </ul>
                    </nav>
                </aside>

                <section id="crear-wo">
                    <h2>Crear una nueva W.O.</h2>
                    <form id="form-wo">
                        <div>
                            <label for="model">Modelo</label>
                            <input type="text" id="model" name="model" required>
                        </div>

                        <div>
                            <label>cantidad</label>
                            <input type="number" id="cantidad" name="cantidad" required>
                        </div>

                        <div>
                            <label for="fecha">Fecha de creación</label>
                            <input type="date" id="fecha" name="fecha" required>
                        </div>

                        <div>
                            <label for="tipo">Tipo</label>
                            <select id="tipo" name="tipo" required>
                                <option value="a">A</option>
                                <option value="b">B</option>
                                <option value="c">C</option>
                            </select>
                        </div>

                        <div>
                            <label for="estatus">Estatus</label>
                            <input type="text" id="estatus" name="estatus" readonly>
                        </div>

                        <div>
                            <label for="comentario">Comentario</label>
                            <input type="text" id="comentario" name="comentario" required>
                        </div>

                        <div>
                            <label for="info">Información adicional</label><br>
                            <textarea id="info" name="info" rows="12" cols="50"></textarea>
                        </div>

                        <div>
                            <label for="wo">Numero de WO</label>
                            <input type="Text" id="wo" name="wo" readonly>
                        </div>

                        <div class="button">
                        <button type="submit">Crear W.O.</button>
                        <button id="btn-consultar">Consultar</button>
                        </div>
                    </form>
            </section>
        </main>

        <script src="index.js"></script>
    </body>
<html>
